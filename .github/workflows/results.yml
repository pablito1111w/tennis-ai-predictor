name: ATP Results Tracker

on:

  schedule:

    # Paleidžia kasdien 20:00 UTC
    # Lietuvoje apie 22:00 (vasarą 23:00)

    - cron: "0 20 * * *"


  workflow_dispatch:



jobs:

  results-check:


    runs-on: ubuntu-latest


    steps:


      - name: Atsisiųsti kodą
        uses: actions/checkout@v4



      - name: Nustatyti Python
        uses: actions/setup-python@v5

        with:

          python-version: "3.11"



      - name: Įdiegti bibliotekas

        run: |

          pip install -r requirements.txt



      - name: Tikrinti rezultatus

        env:

          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}

          CHAT_ID: ${{ secrets.CHAT_ID }}


        run: |

          python results_bot.py
